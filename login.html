<!doctype html>
<html>
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - GitHub Issues Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
      body { font-family: 'Inter', sans-serif; }
    </style>
  </head>

  <body class="flex items-center justify-center min-h-screen bg-gray-50 p-4">
    <div class="bg-white px-8 py-10 w-full max-w-md text-center">
      <img src="./assets/github-logo.png" alt="GitHub Logo" class="h-12 w-12 mx-auto mb-6">
      
      <h2 class="text-2xl font-bold mb-2 text-gray-900">GitHub Issues Tracker</h2>
      <p class="text-gray-500 mb-8 text-sm">Sign in to manage your issues</p>

      <input type="text" id="username" placeholder="Username" class="w-full px-4 py-3 mb-4 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-indigo-600 focus:border-transparent text-gray-900" />
      <input type="password" id="password" placeholder="Password" class="w-full px-4 py-3 mb-6 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-indigo-600 focus:border-transparent text-gray-900" />

      <button onclick="login()" class="w-full bg-[#4f46e5] hover:bg-[#4338ca] text-white font-medium py-3 rounded-md transition duration-200 shadow-sm">Sign In</button>

      <div class="mt-8 text-sm text-gray-500 text-center">
        <p class="font-medium text-gray-700 mb-1">Demo Credentials</p>
        <p>Username: <span class="text-gray-900 font-medium">admin</span> | Password: <span class="text-gray-900 font-medium">admin123</span></p>
      </div>
    </div>

    <script src="login.js"></script>
  </body>
</html>
